# Configuration de déploiement Netlify pour l'app Vite + React

[build]
  command = "npm run build"
  publish = "dist"

# Fallback SPA : toutes les routes renvoient vers index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# En-têtes de sécurité (défense en profondeur côté client).
# - Anti-clickjacking : interdit l'inclusion de l'app dans une iframe tierce.
# - Référent minimal, pas de sniffing MIME, et HSTS sur tout le domaine.
# - CSP : script-src strict ('self', aucun inline → le build n'a aucun script inline).
#   style-src autorise 'unsafe-inline' car React (styles inline) et le divIcon Leaflet
#   (MapView) posent des attributs style. Origines externes tracées : Supabase (REST +
#   storage CDN + realtime wss), tuiles OpenStreetMap, geocodeur Photon, Google Fonts.
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    Permissions-Policy = "geolocation=(self), camera=(), microphone=()"
    Content-Security-Policy = "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; form-action 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https://*.tile.openstreetmap.org https://yljskqyvqumvtmvptkxt.supabase.co; connect-src 'self' https://yljskqyvqumvtmvptkxt.supabase.co wss://yljskqyvqumvtmvptkxt.supabase.co https://photon.komoot.io"
